name: 'electric_project'
version: '1.0.0'
config-version: 2

# THIS IS KEY: It must match the header name in your profiles.yml
profile: 'electric_project'

# Project route definition
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"
# Model configuration (hierarchy and default materializations)
models:
  electric_project:
    # By default, everything in staging will be a view
    staging:
      +materialized: view
    # By default, everything in marts will be a table
    marts:
      +materialized: table